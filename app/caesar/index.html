<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="./main.js" defer></script>
</head>
<body>
      <div>      
        <div>
            <!-- Title -->
            <h1>Caesar Cypher</h1>
            <h2>Vanilla JS</h1>

            <!-- Form -->
            <form>
                <label for="cypher-key">Cypher key</label>
                <input type="number" 
                       min="1" 
                       max="25" 
                       value="1" 
                       name="cypher-key" 
                       required
                       data-cy="cypher-key"
                />

                <textarea placeholder="Enter a text to cypher..." data-cy="cypher-msg"></textarea>
                
                <button type="button" data-cy="cypher-btn">Cypher</button>
            </form>

            <!-- Result -->
            <p id="result" data-cy="cypher-result"></p>
        </div>             
    </div>
</body>
</html>
